<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        text-align: center;
        width: 100vw;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <script>
      let arr = [];
      for (let i = 0; i <= 4; i++) {
        let p = Number(prompt(`enter number ${i + 1}`));
        arr.push(p);
      }
      console.log(arr);

      let sum = 0;
      let j = 0;
      // for(let j=0;j<5;j++){
      //     sum=sum + arr[j];
      // }
      while (j < 5) {
        sum = sum + arr[j];
        j++;
      }

      document.querySelector(".box").innerHTML = `the sum of numbers is ${sum}`;
    </script>
  </body>
</html>
