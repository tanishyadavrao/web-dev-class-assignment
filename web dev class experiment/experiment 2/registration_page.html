<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login page</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }

      .con { 
        height: 100vh;
        width: 100vw;
        display: flex;
        background-color: antiquewhite;
      }

      .box {
        height: 560px;
        width: 320px;
        border-radius: 10px;
        background-color: rgb(255, 212, 127);
        margin: auto;
        display: flex;
        flex-direction: column;
      }

      h1 {
        text-align: center;
        margin-top: 20px;
        font-size: 50px;
      }

      .input {
        height: 30px;
        width: 250px;
        margin-top: 15px;
        padding-left: 10px;
        border-radius: 7px;
        margin-left: 20px;
        border: 1px;
      }

      .login {
        border: 2px solid white;
        height: 35px;
        width: 180px;
        background-color: aliceblue;
        margin-top: 30px;
        margin-left: 70px;
        text-align: center;
        border-radius: 7px;
        text-decoration: none;
        color: black;
        font-size: 25px;
        font-weight: 400;
        font-family: sans-serif;
      }

      .login:hover {
        cursor: pointer;
        transform: scale(1.07);
        background-color: #93c8d7;
      }

      .text1 {
        text-align: center;
        margin: 2px;
        margin-left: 5px;
      }

      .signup {
        display: flex;
        justify-content: center;
      }

      .sgnupbtn {
        text-decoration: none;
      }

      .sgnupbtn:hover {
        cursor: pointer;
        transform: scale(1.08);
      }
    </style>
  </head>

  <body>
    <div class="con">
      <div class="box">
        <h1>Book Store</h1>
        <input type="text" placeholder="Name" class="name input" required />
        <input type="number" class="input" placeholder="Contact No." />
        <input type="date" class="input" placeholder="mm/dd/yyyy" />

        <input type="email" placeholder="Email" class="email input" required />
        <input type="password" placeholder="Password" class="pass input" />
        <input
          type="password"
          placeholder="Confirm Password"
          class="pass input"
        />
        <a href="home.html" class="login">Log in</a>
        <div class="signup">
          <div class="text1">don't have an account?</div>
          <a href="fgt_pswrd.html" class="text1 sgnupbtn">sign up</a>
        </div>
      </div>
    </div>
  </body>
</html>
