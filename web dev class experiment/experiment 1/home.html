<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>home</title>

    <style>
      * {
        padding: 0;
        margin: 0;
      }

      .bottom {
        display: flex;
        justify-content: space-around;
        font-size: 20px;
        font-weight: 600;
        background-color: rgb(196, 196, 196);
        padding: 10px;
        position: fixed;
        bottom: 0px;
        width: 100vw;
      }

      .home,
      .cataloge,
      .profile {
        color: greenyellow;
        padding: 10px;
        border-radius: 10px;
        background-color: black;
        text-decoration: none;
      }

      .home:hover,
      .cataloge:hover,
      .profile:hover {
        color: black;
        background-color: rgb(19, 184, 216);
      }
      .header {
        background-color: rgb(19, 184, 216);
        color: white;
        font-size: 30px;
        display: flex;
        justify-content: space-around;
      }

      .head {
        font-weight: 600;
        padding: 10px;
      }

      .t1 {
        font-size: 25px;
        font-weight: 600;
        padding: 10px;
        margin-left: 250px;
      }

      .book {
        width: 300px;
        height: 470px;
        border: 1px solid black;
        margin: auto;
        border-radius: 10px;
        background-color: rgb(232, 232, 232);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        margin-top: 10px;
        margin-bottom: 10px;
      }

      img {
        width: 240px;
        border-radius: 10px;
      }

      .bookimg {
        margin: 10px 30px;
      }

      .bookname {
        font-size: 18px;
        font-weight: 700;
      }

      .bookbtn {
        background-color: black;
        color: white;
        padding: 10px;
        border: 0px;
        border-radius: 5px;
      }

      .booklast {
        margin-bottom: 70px;
      }
      .buttons {
        display: flex;
        margin: 10px;
        text-decoration: none;
      }
      .button {
        text-decoration: none;
        color: white;
        margin-left: 20px;
        border: 2px solid rgb(212, 175, 91);
        border-radius: 10px;
        background-color: rgb(212, 175, 91);
        width: 100px;
        height: 40px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="con">
      <div class="start">
        <div class="header">
          <div class="head">Book Store</div>
          <div class="buttons">
            <a href="home.html" class="button">Home</a>
            <a href="catalog.html" class="button">Explore</a>
            <a href="biodata.html" class="button">Profile</a>
          </div>
        </div>
        <div class="t1">Most sold of the week</div>
        <div class="card">
          <div class="book">
            <div class="bookimg">
              <img
                src="https://d9h54mr6do0h0.cloudfront.net/bookimage/9789386650320_tn.jpg"
              />
            </div>
            <div class="bookname">Introductory-Web Design</div>
            <div class="bookauthor">Campbell</div>
            <div>
              <button class="bookbtn">Read Now</button>
            </div>
          </div>
        </div>
        <div class="t1">Most liked of the week</div>
        <div class="card">
          <div class="booklast book">
            <div class="bookimg">
              <img
                src="https://d9h54mr6do0h0.cloudfront.net/bookimage/9789386650320_tn.jpg"
              />
            </div>
            <div class="bookname">Introductory-Web Design</div>
            <div class="bookauthor">Campbell</div>
            <div>
              <button class="bookbtn">Read Now</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
